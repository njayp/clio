repo: ""          # required: owner/repo (set by parent chart)
target: ""        # optional: app.kubernetes.io/name (empty = all pods in release)
secretName: ""    # required: name of Secret containing ANTHROPIC_API_KEY and GITHUB_TOKEN
cooldown: "1h"
maxConcurrency: 3
tailLines: 100
maxPRsPerHour: 5
batchWindow: "5s"
maxAgentTurns: 25
dryRun: false     # set true for initial rollout observation
port: 8080
serviceMonitor:
  enabled: false  # set true if prometheus-operator CRDs are installed
image:
  repository: ghcr.io/njayp/clio
  tag: ""   # defaults to Chart.appVersion; override with --set image.tag=xxx
resources:
  requests:
    memory: 128Mi
    cpu: 200m
  limits:
    memory: 1Gi
    cpu: "1"
