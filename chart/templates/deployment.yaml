apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clio.fullname" . }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "clio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clio.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "clio.fullname" . }}
      containers:
        - name: clio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: CLIO_REPO
              value: {{ required "clio.repo is required" .Values.repo | quote }}
            - name: CLIO_RELEASE
              value: {{ .Release.Name | quote }}
            - name: CLIO_TARGET
              value: {{ .Values.target | quote }}
            - name: CLIO_COOLDOWN
              value: {{ .Values.cooldown | quote }}
            - name: CLIO_MAX_CONCURRENCY
              value: {{ .Values.maxConcurrency | quote }}
            - name: CLIO_TAIL_LINES
              value: {{ .Values.tailLines | quote }}
            - name: CLIO_MAX_PRS_PER_HOUR
              value: {{ .Values.maxPRsPerHour | quote }}
            - name: CLIO_BATCH_WINDOW
              value: {{ .Values.batchWindow | quote }}
            - name: CLIO_MAX_AGENT_TURNS
              value: {{ .Values.maxAgentTurns | quote }}
            - name: CLIO_MAX_AGENT_BUDGET
              value: {{ .Values.maxAgentBudget | quote }}
            - name: CLIO_DRY_RUN
              value: {{ .Values.dryRun | quote }}
            - name: CLIO_PORT
              value: {{ .Values.port | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "clio.secretName is required" .Values.secretName }}
                  key: ANTHROPIC_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: workspace
              mountPath: /tmp/clio-workspaces
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 2Gi
